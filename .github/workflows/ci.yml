name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (jest)
        run: npm test
